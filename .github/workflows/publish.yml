name: Publish package

# Build the magication-moat package and publish it to PyPI on every push to main.
on:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # setuptools-scm needs full history + tags to derive the version
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install project (with dev deps) and run tests
        run: |
          python -m pip install --upgrade pip
          pip install -e '.[dev]'
          pytest -q
      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs: build
    runs-on: ubuntu-latest
    # Trusted publishing binds to this environment name on the PyPI side (see RELEASING.md).
    environment: pypi
    permissions:
      id-token: write  # OIDC token for PyPI trusted publishing — no API token secret needed
    steps:
      - name: Download dist artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
